headersOrigin = "config"
redirectsOrigin = "config"

[functions]
directory = "netlify/functions"

[[plugins]]
origin = "ui"
package = "@netlify/plugin-lighthouse"
pinned_version = "6"

[build]
base = "."
command = "cd app && npm ci && npm run build"
publish = "app/dist"
publishOrigin = "config"

[[headers]]
for = "/*"

  [headers.values]
  Content-Security-Policy = "default-src 'self'; script-src 'self' https://challenges.cloudflare.com https://www.googletagmanager.com https://www.google-analytics.com https://www.clarity.ms https://analytics.tiktok.com; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: https:; connect-src 'self' https://challenges.cloudflare.com https://www.google-analytics.com https://analytics.google.com https://region1.google-analytics.com https://www.clarity.ms https://*.clarity.ms https://analytics.tiktok.com https://analytics-sg.tiktok.com https://*.tiktokw.us; frame-src 'self' https://challenges.cloudflare.com https://www.google.com https://maps.google.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
  Permissions-Policy = "camera=(), microphone=(), geolocation=()"
  Referrer-Policy = "strict-origin-when-cross-origin"
  Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
  X-Content-Type-Options = "nosniff"
  X-Frame-Options = "DENY"

[[headers]]
for = "/assets/*"

  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/*.xml"

  [headers.values]
  Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
for = "/robots.txt"

  [headers.values]
  Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
for = "/llms.txt"

  [headers.values]
  Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
for = "/site.webmanifest"

  [headers.values]
  Cache-Control = "public, max-age=3600, must-revalidate"
  Content-Type = "application/manifest+json; charset=UTF-8"

[[headers]]
for = "/sw.js"

  [headers.values]
  Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/.netlify/functions/*"

  [headers.values]
  X-Robots-Tag = "noindex, nofollow"

