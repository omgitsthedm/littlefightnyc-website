headersOrigin = "config"
redirectsOrigin = "config"

[functions]
directory = "netlify/functions"

[[plugins]]
origin = "ui"
package = "@netlify/plugin-lighthouse"
pinned_version = "6"

[build]
base = "."
command = "cd app && npm ci && npm run build"
publish = "app/dist"
publishOrigin = "config"

[[headers]]
for = "/*"

  [headers.values]
  Content-Security-Policy = "default-src 'self'; script-src 'self' https://challenges.cloudflare.com https://www.googletagmanager.com https://www.google-analytics.com https://www.clarity.ms https://analytics.tiktok.com; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: https:; connect-src 'self' https://api.weather.gov https://challenges.cloudflare.com https://www.google-analytics.com https://analytics.google.com https://region1.google-analytics.com https://www.clarity.ms https://*.clarity.ms https://analytics.tiktok.com https://analytics-sg.tiktok.com https://*.tiktokw.us; frame-src 'self' https://challenges.cloudflare.com https://www.google.com https://maps.google.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
  Permissions-Policy = "camera=(), microphone=(), geolocation=()"
  Referrer-Policy = "strict-origin-when-cross-origin"
  Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
  X-Content-Type-Options = "nosniff"
  X-Frame-Options = "DENY"
  # Speculation Rules via header (not inline <script>) — no CSP change needed.
  # Conservative: prefetch-on-hover of page HTML only; helps hard navigations
  # (new-tab/cmd-clicks, post-deploy reloads) — in-SPA navs are already instant.
  Speculation-Rules = '"/speculation-rules.json"'

[[headers]]
for = "/speculation-rules.json"

  [headers.values]
  Content-Type = "application/speculationrules+json"
  Cache-Control = "public, max-age=300"

[[headers]]
for = "/assets/*"

  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

# The retired Lab subdomain is preserved as a static gallery under
# /examples/lab/. Its standalone concept pages use inline scripts, Google
# Fonts, and narrowly scoped module-CDN imports that the main app does not.
[[headers]]
for = "/examples/lab/*"

  [headers.values]
  Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://unpkg.com https://esm.sh; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://cdnjs.cloudflare.com https://unpkg.com https://esm.sh; media-src 'self' https:; frame-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self' https://demo-colorway.netlify.app; object-src 'none'"
  X-Frame-Options = "SAMEORIGIN"

# Preserve the old Lab's client-concept indexing boundary.
[[headers]]
for = "/examples/lab/concepts/chef-drew/*"

  [headers.values]
  X-Robots-Tag = "noindex, nofollow"

[[headers]]
for = "/examples/lab/concepts/aha-laser/*"

  [headers.values]
  X-Robots-Tag = "noindex, nofollow"

# The retired standalone Audit Lab is hosted under /examples/audit/. Its
# preserved pages and generated reports use inline scripts plus Google Fonts,
# so they need the standalone site's narrower policy instead of the main app's.
[[headers]]
for = "/examples/audit/*"

  [headers.values]
  Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self'; img-src 'self' data:; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self' mailto:"
  Referrer-Policy = "strict-origin-when-cross-origin"
  X-Content-Type-Options = "nosniff"
  X-Frame-Options = "DENY"
  X-XSS-Protection = "1; mode=block"

[[headers]]
for = "/examples/audit/report/*"

  [headers.values]
  Cache-Control = "no-cache"

[[headers]]
for = "/examples/audit/api/og"

  [headers.values]
  Cache-Control = "public, max-age=86400, stale-while-revalidate=604800"

[[headers]]
for = "/examples/audit/api/*"

  [headers.values]
  Access-Control-Allow-Headers = "Content-Type"
  Access-Control-Allow-Methods = "GET, POST, OPTIONS"
  Access-Control-Allow-Origin = "https://littlefightnyc.com"
  Access-Control-Max-Age = "86400"
  Cache-Control = "no-store"

[[headers]]
for = "/*.xml"

  [headers.values]
  Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
for = "/robots.txt"

  [headers.values]
  Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
for = "/llms.txt"

  [headers.values]
  Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
for = "/site.webmanifest"

  [headers.values]
  Cache-Control = "public, max-age=3600, must-revalidate"
  Content-Type = "application/manifest+json; charset=UTF-8"

[[headers]]
for = "/sw.js"

  [headers.values]
  Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/.netlify/functions/*"

  [headers.values]
  X-Robots-Tag = "noindex, nofollow"

# ============================================================
# REDIRECTS LIVE IN app/public/_redirects — NOT HERE.
# Netlify processes _redirects before this file, so any rule
# added here alone is dead on arrival (this shadowing hard-404'd
# ~30 legacy URLs until 2026-07-12). One source of truth only.
# ============================================================
