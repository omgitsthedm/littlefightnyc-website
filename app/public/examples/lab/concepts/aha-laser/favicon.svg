<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="65%">
      <stop offset="0" stop-color="#1a0013"/>
      <stop offset="1" stop-color="#000"/>
    </radialGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="1.4" result="b1"/>
      <feGaussianBlur stdDeviation="3.5" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="64" height="64" rx="10" fill="url(#bg)"/>
  <text x="32" y="44" text-anchor="middle" font-family="Impact,Arial Black,sans-serif" font-size="34" fill="#ff2bd6" stroke="#ffd0f7" stroke-width="1" filter="url(#glow)">AHA</text>
</svg>
