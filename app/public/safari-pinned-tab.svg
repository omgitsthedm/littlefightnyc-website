<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 224" role="img" aria-label="Little Fight NYC">
  <!-- Little Fight NYC — the Tugboat. Hand-built silhouette, single-color (currentColor),
       true negative-space knockouts, a smoke curl for soul. Reverses on any ground. -->
  <defs>
    <mask id="tugmask">
      <rect width="256" height="224" fill="#000"/>
      <!-- smoke curl (rising puffs) -->
      <circle cx="92" cy="40" r="12" fill="#fff"/>
      <circle cx="107" cy="26" r="9.5" fill="#fff"/>
      <circle cx="119" cy="15" r="7" fill="#fff"/>
      <!-- smokestack (bolder, slight taper) -->
      <path fill="#fff" d="M76 58 q0 -9 9 -9 h16 q9 0 9 9 l-3 60 h-28 z"/>
      <!-- wheelhouse -->
      <rect x="118" y="76" width="62" height="48" rx="16" fill="#fff"/>
      <!-- lower deck house -->
      <rect x="56" y="114" width="146" height="22" rx="9" fill="#fff"/>
      <!-- hull: stout, confident raised bow on the RIGHT, deep rounded belly -->
      <path fill="#fff" d="M50 132
        L172 132
        C198 132 212 125 219 112
        C223 106 229 115 223 129
        C215 151 206 160 193 161
        C150 171 96 171 73 161
        C57 154 44 147 48 132
        Q49 131 50 132 Z"/>
      <!-- HOLES -->
      <rect x="76" y="72" width="30" height="8" rx="4" fill="#000"/>   <!-- stack band -->
      <rect x="128" y="88" width="16" height="18" rx="4" fill="#000"/> <!-- window -->
      <rect x="152" y="88" width="12" height="18" rx="4" fill="#000"/> <!-- window -->
      <circle cx="74" cy="162" r="7" fill="#000"/>                     <!-- portholes -->
      <circle cx="104" cy="162" r="7" fill="#000"/>
      <circle cx="134" cy="162" r="7" fill="#000"/>
    </mask>
  </defs>
  <rect width="256" height="224" fill="#000000" mask="url(#tugmask)"/>
  <!-- waterline (two confident strokes) -->
  <g fill="#000000">
    <rect x="30" y="200" width="80" height="9" rx="4.5"/>
    <rect x="122" y="200" width="104" height="9" rx="4.5"/>
  </g>
</svg>
