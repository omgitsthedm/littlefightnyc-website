<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Little Fight NYC Forms</title>
    <meta name="robots" content="noindex, nofollow" />
  </head>
  <body>
    <form name="fit-check-scratch" method="POST" action="/thanks/" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="fit-check-scratch" />
      <input type="hidden" name="subject" value="New Little Fight NYC Tech Audit" />
      <input type="hidden" name="source" value="littlefightnyc.com/tech-audit" />
      <input name="bot-field" />
      <input name="name" />
      <input name="business" />
      <input name="contact" />
      <input name="symptom" />
      <input name="urgency" />
      <input name="intent" />
      <input name="lead_origin" />
      <input name="website_url" />
      <input name="report_id" />
      <input name="utm_source" />
      <input name="utm_medium" />
      <input name="utm_campaign" />
      <input name="utm_term" />
      <input name="utm_content" />
      <input name="gclid" />
      <input name="gbraid" />
      <input name="wbraid" />
      <select name="follow_up">
        <option value="text">Text me</option>
        <option value="phone">Call me</option>
        <option value="email">Email me</option>
        <option value="fastest">Whatever's fastest</option>
      </select>
      <textarea name="message"></textarea>
    </form>
  </body>
</html>
